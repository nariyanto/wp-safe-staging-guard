name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-release-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none

      - name: Run tests
        run: php tests/run.php

      - name: Validate readme metadata
        run: php tests/validate-readme.php

      - name: Lint PHP files
        run: find . -path ./.git -prune -o -path ./dist -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Build plugin ZIP
        run: bash scripts/build-release.sh

      - name: Validate plugin ZIP
        run: python3 scripts/validate-release-zip.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nariyanto-safe-staging-guard
          path: dist/nariyanto-safe-staging-guard.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nariyanto-safe-staging-guard.zip
          generate_release_notes: true
